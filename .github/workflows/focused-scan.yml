name: Focused Coin Scan (지정종목)

on:
  schedule:
    # 4시간마다 자동 분석 (UTC 기준)
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r focused_viewer/requirements-web.txt

      - name: Run focused analysis
        run: python focused_viewer/run_scan.py
        env:
          MPLBACKEND: Agg

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add focused_viewer/data/latest.json
          git diff --staged --quiet || git commit -m "chore: update focused coin analysis $(date -u +%Y-%m-%dT%H:%MZ)"
          git push