name: Elliott Wave Scan

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:   # Allow manual "Run workflow" button on GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit results

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Elliott Wave Scanner
        run: |
          python elliott_wave_scanner.py --json --output-dir results

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "chore: update Elliott Wave scan results $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}